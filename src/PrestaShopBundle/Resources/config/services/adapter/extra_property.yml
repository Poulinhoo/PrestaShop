services:
  _defaults:
    autowire: true
    public: false

  # ─── Validation ──────────────────────────────────────────────────────────────

  PrestaShop\PrestaShop\Core\ExtraProperty\Validation\ExtraPropertyValueValidator:
    arguments:
      $translator: '@translator'

  PrestaShop\PrestaShop\Core\ExtraProperty\Validation\ExtraPropertyValidationInterface:
    alias: 'PrestaShop\PrestaShop\Core\ExtraProperty\Validation\ExtraPropertyValueValidator'
    public: true

  # Single filesystem cache pool for extra property definitions.
  # Used by CachedExtraPropertyDefinitionRepository (reads) and CachedExtraPropertyRegistry (invalidation).
  prestashop.extra_property.definition.filesystem_cache:
    class: Symfony\Component\Cache\Adapter\FilesystemAdapter
    arguments:
      - ''
      - 0
      - '%ps_cache_dir%/extra_property_definition'

  # ─── Repository ──────────────────────────────────────────────────────────────

  PrestaShop\PrestaShop\Core\ExtraProperty\Definition\ExtraPropertyDefinitionRepository:
    arguments:
      $connection: '@doctrine.dbal.default_connection'
      $prefix: '%database_prefix%'

  PrestaShop\PrestaShop\Core\ExtraProperty\Definition\ExtraPropertyDefinitionWriterInterface:
    alias: 'PrestaShop\PrestaShop\Core\ExtraProperty\Definition\ExtraPropertyDefinitionRepository'

  # ─── Cached repository decorator (read-only, production use) ─────────────────

  PrestaShop\PrestaShop\Core\ExtraProperty\Definition\CachedExtraPropertyDefinitionRepository:
    arguments:
      $repository: '@PrestaShop\PrestaShop\Core\ExtraProperty\Definition\ExtraPropertyDefinitionRepository'
      $definitionCache: '@prestashop.extra_property.definition.filesystem_cache'

  PrestaShop\PrestaShop\Core\ExtraProperty\Definition\ExtraPropertyDefinitionRepositoryInterface:
    alias: 'PrestaShop\PrestaShop\Core\ExtraProperty\Definition\CachedExtraPropertyDefinitionRepository'
    public: true

  # ─── Schema manager (raw DDL, no cache) ──────────────────────────────────────

  PrestaShop\PrestaShop\Core\ExtraProperty\Schema\ExtraPropertySchemaManager:
    arguments:
      $connection: '@doctrine.dbal.default_connection'
      $prefix: '%database_prefix%'
      $logger: '@?logger'

  PrestaShop\PrestaShop\Core\ExtraProperty\Schema\ExtraPropertySchemaManagerInterface:
    alias: 'PrestaShop\PrestaShop\Core\ExtraProperty\Schema\ExtraPropertySchemaManager'

  # ─── Registry (pure — no cache) ──────────────────────────────────────────────

  PrestaShop\PrestaShop\Core\ExtraProperty\Definition\ExtraPropertyRegistry:
    arguments:
      $readRepository: '@PrestaShop\PrestaShop\Core\ExtraProperty\Definition\ExtraPropertyDefinitionRepositoryInterface'
      $writeRepository: '@PrestaShop\PrestaShop\Core\ExtraProperty\Definition\ExtraPropertyDefinitionRepository'
      $schemaManager: '@PrestaShop\PrestaShop\Core\ExtraProperty\Schema\ExtraPropertySchemaManagerInterface'
      $validator: '@PrestaShop\PrestaShop\Core\ExtraProperty\Validation\ExtraPropertyValidationInterface'
      $logger: '@logger'

  # ─── Cached registry decorator (single point of cache invalidation) ───────────

  PrestaShop\PrestaShop\Core\ExtraProperty\Definition\CachedExtraPropertyRegistry:
    arguments:
      $inner: '@PrestaShop\PrestaShop\Core\ExtraProperty\Definition\ExtraPropertyRegistry'
      $definitionCache: '@prestashop.extra_property.definition.filesystem_cache'

  PrestaShop\PrestaShop\Core\ExtraProperty\Definition\ExtraPropertyRegistryInterface:
    alias: 'PrestaShop\PrestaShop\Core\ExtraProperty\Definition\CachedExtraPropertyRegistry'
    public: true

  # ─── Reader ──────────────────────────────────────────────────────────────────

  PrestaShop\PrestaShop\Core\ExtraProperty\Value\ExtraPropertyReader:
    arguments:
      $repository: '@PrestaShop\PrestaShop\Core\ExtraProperty\Definition\ExtraPropertyDefinitionRepositoryInterface'
      $connection: '@doctrine.dbal.default_connection'
      $prefix: '%database_prefix%'

  PrestaShop\PrestaShop\Core\ExtraProperty\Value\ExtraPropertyReaderInterface:
    alias: 'PrestaShop\PrestaShop\Core\ExtraProperty\Value\ExtraPropertyReader'
    public: true

  # ─── Writer ──────────────────────────────────────────────────────────────────

  PrestaShop\PrestaShop\Core\ExtraProperty\Value\ExtraPropertyWriter:
    arguments:
      $connection: '@doctrine.dbal.default_connection'
      $prefix: '%database_prefix%'

  PrestaShop\PrestaShop\Core\ExtraProperty\Value\ExtraPropertyWriterInterface:
    alias: 'PrestaShop\PrestaShop\Core\ExtraProperty\Value\ExtraPropertyWriter'
    public: true

  PrestaShop\PrestaShop\Core\ExtraProperty\Value\ExtraPropertyValueCaster: ~

  # ─── Back-office form services ────────────────────────────────────────────────

  PrestaShop\PrestaShop\Core\ExtraProperty\Form\ExtraPropertiesFormBuilderModifier:
    arguments:
      $repository: '@PrestaShop\PrestaShop\Core\ExtraProperty\Definition\ExtraPropertyDefinitionRepositoryInterface'
      $reader: '@PrestaShop\PrestaShop\Core\ExtraProperty\Value\ExtraPropertyReaderInterface'
      $translator: '@translator'
      $validatorAdapter: '@PrestaShop\PrestaShop\Core\ExtraProperty\Validation\ExtraPropertyValidationInterface'
      $shopContext: '@PrestaShop\PrestaShop\Core\Context\ShopContext'
      $formBuilderModifier: '@PrestaShopBundle\Form\FormBuilderModifier'
      $caster: '@PrestaShop\PrestaShop\Core\ExtraProperty\Value\ExtraPropertyValueCaster'

  PrestaShop\PrestaShop\Core\ExtraProperty\Form\ExtraPropertiesFormDataPersister:
    arguments:
      $repository: '@PrestaShop\PrestaShop\Core\ExtraProperty\Definition\ExtraPropertyDefinitionRepositoryInterface'
      $writer: '@PrestaShop\PrestaShop\Core\ExtraProperty\Value\ExtraPropertyWriterInterface'
      $shopContext: '@PrestaShop\PrestaShop\Core\Context\ShopContext'
      $caster: '@PrestaShop\PrestaShop\Core\ExtraProperty\Value\ExtraPropertyValueCaster'

  # ─── Admin API extra properties service ──────────────────────────────────────

  PrestaShopBundle\ApiPlatform\ExtraProperties\ExtraPropertiesApiService:
    arguments:
      $repository: '@PrestaShop\PrestaShop\Core\ExtraProperty\Definition\ExtraPropertyDefinitionRepositoryInterface'
      $requestStack: '@request_stack'
      $reader: '@PrestaShop\PrestaShop\Core\ExtraProperty\Value\ExtraPropertyReaderInterface'
      $writer: '@PrestaShop\PrestaShop\Core\ExtraProperty\Value\ExtraPropertyWriterInterface'
      $validatorAdapter: '@PrestaShop\PrestaShop\Core\ExtraProperty\Validation\ExtraPropertyValidationInterface'
      $shopContext: '@PrestaShop\PrestaShop\Core\Context\ShopContext'
      $langRepository: '@PrestaShopBundle\Entity\Repository\LangRepository'
      $propertyNameCollectionFactory: '@?api_platform.metadata.property_name_collection_factory'
      $propertyMetadataFactory: '@?api_platform.metadata.property.metadata_factory'
