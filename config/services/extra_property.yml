services:
  _defaults:
    autowire: true
    public: false

  # Single filesystem cache pool shared by the repository (reads) and the registry decorator (invalidation).
  prestashop.extra_property.definition.filesystem_cache:
    class: Symfony\Component\Cache\Adapter\FilesystemAdapter
    arguments:
      - ''
      - 0
      - '%ps_cache_dir%/extra_property_definition'

  # ─── Repository ──────────────────────────────────────────────────────────────

  PrestaShop\PrestaShop\Core\ExtraProperty\Definition\ExtraPropertyDefinitionRepository:
    arguments:
      $connection: '@doctrine.dbal.default_connection'
      $prefix: '%database_prefix%'

  PrestaShop\PrestaShop\Core\ExtraProperty\Definition\ExtraPropertyDefinitionWriterInterface:
    alias: 'PrestaShop\PrestaShop\Core\ExtraProperty\Definition\ExtraPropertyDefinitionRepository'

  # ─── Cached repository decorator (read-only, production use) ─────────────────

  PrestaShop\PrestaShop\Core\ExtraProperty\Definition\CachedExtraPropertyDefinitionRepository:
    arguments:
      $repository: '@PrestaShop\PrestaShop\Core\ExtraProperty\Definition\ExtraPropertyDefinitionRepository'
      $definitionCache: '@prestashop.extra_property.definition.filesystem_cache'

  PrestaShop\PrestaShop\Core\ExtraProperty\Definition\ExtraPropertyDefinitionRepositoryInterface:
    alias: 'PrestaShop\PrestaShop\Core\ExtraProperty\Definition\CachedExtraPropertyDefinitionRepository'
    public: true

  # ─── Validation ──────────────────────────────────────────────────────────────

  PrestaShop\PrestaShop\Core\ExtraProperty\Validation\ExtraPropertyValueValidator: ~

  PrestaShop\PrestaShop\Core\ExtraProperty\Validation\ExtraPropertyValidationInterface:
    alias: 'PrestaShop\PrestaShop\Core\ExtraProperty\Validation\ExtraPropertyValueValidator'
    public: true

  # ─── Reader ──────────────────────────────────────────────────────────────────

  PrestaShop\PrestaShop\Core\ExtraProperty\Value\ExtraPropertyReader:
    arguments:
      $repository: '@PrestaShop\PrestaShop\Core\ExtraProperty\Definition\ExtraPropertyDefinitionRepositoryInterface'
      $connection: '@doctrine.dbal.default_connection'
      $prefix: '%database_prefix%'

  PrestaShop\PrestaShop\Core\ExtraProperty\Value\ExtraPropertyReaderInterface:
    alias: 'PrestaShop\PrestaShop\Core\ExtraProperty\Value\ExtraPropertyReader'
    public: true

  # ─── Writer ──────────────────────────────────────────────────────────────────

  PrestaShop\PrestaShop\Core\ExtraProperty\Value\ExtraPropertyWriter:
    arguments:
      $connection: '@doctrine.dbal.default_connection'
      $prefix: '%database_prefix%'

  PrestaShop\PrestaShop\Core\ExtraProperty\Value\ExtraPropertyWriterInterface:
    alias: 'PrestaShop\PrestaShop\Core\ExtraProperty\Value\ExtraPropertyWriter'
    public: true
